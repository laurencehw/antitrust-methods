project:
  type: book
  output-dir: _book

book:
  title: "Antitrust Methods: Research and Practice"
  author: "Laurence Wilse-Samson"
  chapters:
    - index.qmd
    - chapters/00-preface.qmd
    - chapters/01-orientation.qmd
    - chapters/02-research-design.qmd
    - chapters/03-market-definition.qmd
    - chapters/04-io-toolkit.qmd
    - chapters/05-cartels.qmd
    - chapters/06-mergers.qmd
    - chapters/07-monopolization.qmd
    - chapters/08-regulation-remedies.qmd
    - chapters/09-digital-markets.qmd
    - chapters/10-labor-markets.qmd
    - chapters/11-innovation-ip.qmd
    - chapters/12-litigation-practice.qmd
    - chapters/14-closing.qmd
    - chapters/13-empirical-appendix.qmd

bibliography: references/references.bib
csl: https://raw.githubusercontent.com/citation-style-language/styles/master/chicago-author-date.csl

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    code-overflow: scroll
  pdf:
    documentclass: book
    toc: true
    number-sections: true
    pdf-engine: xelatex
    classoption: [openany, oneside]
    fig-crop: false
    code-overflow: wrap
    code-block-bg: "#f5f5f5"
    code-block-border-left: "#2563eb"
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1.25in
    mainfont: "Palatino Linotype"
    mainfontoptions:
      - Scale=1.02
    monofont: "Consolas"
    monofontoptions:
      - Scale=0.85
    include-in-header:
      text: |
        \usepackage{fancyhdr}
        \usepackage{fvextra}
        \DefineVerbatimEnvironment{Highlighting}{Verbatim}{breaklines,commandchars=\\\{\},fontsize=\small}
        \pagestyle{fancy}
        \fancyhf{}
        \fancyhead[LE]{\thepage\quad\small\nouppercase{\leftmark}}
        \fancyhead[RO]{\small\nouppercase{\rightmark}\quad\thepage}
        \renewcommand{\headrulewidth}{0.4pt}
        % Disable figure numbering but keep captions
        \usepackage{caption}
        \captionsetup[figure]{labelformat=empty}
    fig-width: 6
    fig-height: 4
    fig-dpi: 300

lang: en

execute:
  freeze: auto
  warning: false
  message: false
  # Run code from project root so shared helpers are found
  execute-dir: project

knitr:
  opts_chunk:
    # Wrap long lines in code output
    tidy: false
    # Keep output readable
    R.options:
      width: 70
    # Default figure settings
    fig.align: "center"
    out.width: "90%"
    comment: "#>"
