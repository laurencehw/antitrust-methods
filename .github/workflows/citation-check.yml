name: Citation check

# Guards against unrendered/raw "@key" citations regressing. Two layers:
#  1. static-keys  -- fast, deterministic, no Quarto/R needed.
#  2. render-log   -- renders without executing code and scans the log for the
#                     citeproc warnings the static check cannot see.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  static-keys:
    name: Static key resolution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every cited @key resolves; csl is local
        run: python3 program/scripts/check_citations.py

  render-log:
    name: Render-log citation warnings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2   # R binary only; chunks are not executed
      - uses: quarto-dev/quarto-actions/setup@v2
      - name: Render without executing code and scan for unresolved citations
        run: |
          set -o pipefail
          # --no-execute skips R chunks (no data/keys needed) but pandoc + citeproc
          # still run, so unresolved citations surface as warnings.
          quarto render --no-execute 2>&1 | tee render.log || true
          if grep -Eni "citeproc|citation[^.]*not found|reference[^.]*not found" render.log; then
            echo "::error::Unresolved citation warning(s) in render log (see matches above)"
            exit 1
          fi
          echo "No unresolved-citation warnings in render log."
